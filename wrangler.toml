name = "feedi-brine-dev"
main = "worker/index.js"
compatibility_date = "2025-01-01"

[assets]
directory = "assets"
not_found_handling = "single-page-application"
binding = "ASSETS"
run_worker_first = true

[vars]
DOMAIN_NAME = "feedi.brine.dev"
OWNER = "AMOCqVCs9-TMcPsayX9cF7l1veoEPgbzEIZRlPw_zp8"  # paste your pubkey here after deriving it at /admin

[[d1_databases]]
binding = "DB"
database_name = "feedi"
database_id = "b48c42cb-1781-49d0-a272-0fd86de4ce32"

[[migrations]]
tag = "v2"
deleted_classes = ["AnalyticsDO"]

[[r2_buckets]]
binding = "R2"
bucket_name = "feedi-brine-dev"

[triggers]
crons = ["*/42 * * * *"]

[observability]
enabled = true

[observability.logs]
enabled = true
